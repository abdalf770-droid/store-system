<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات - محل ابن الشيخ شتيه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .autocomplete-list {
            position: absolute;
            background: white;
            width: 100%;
            border: 1px solid #ddd;
            border-top: none;
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
        }
        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .autocomplete-item:hover {
            background: #f0f0f0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #218838;
        }
        .info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
        .selected-info {
            background: #d4edda;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-btn">🏠 العودة للرئيسية</a>
        <h2>💰 إضافة مبيعة جديدة</h2>
        <form method="post" id="salesForm">
            <div class="form-group">
                <label>🔍 اكتب اسم المنتج (ابتداءً من أول حرف):</label>
                <input type="text" id="searchInput" placeholder="مثال: شاحن, سماعة, جوال..." autocomplete="off">
                <div id="autocompleteList" class="autocomplete-list"></div>
                <input type="hidden" name="item_id" id="item_id" required>
            </div>
            <div id="selectedInfo" class="selected-info"></div>
            <div class="form-group">
                <label>📦 الكمية:</label>
                <input type="number" name="quantity" id="quantity" required min="1">
            </div>
            <div class="form-group">
                <label>💵 سعر البيع (اتركه فارغاً للسعر الافتراضي):</label>
                <input type="number" name="custom_price" id="custom_price" step="0.01" placeholder="سعر مخصص">
            </div>
            <button type="submit">✅ تأكيد البيع</button>
        </form>
        <div class="info">
            💡 ملاحظة: اكتب أول حرفين من المنتج وسيظهر لك قائمة بالمنتجات المتوفرة
        </div>
    </div>

    <script>
        let items = [];
        
        // جلب الأصناف من قاعدة البيانات
        fetch('/get_items_json')
            .then(res => res.json())
            .then(data => {
                items = data;
            });
        
        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const itemIdInput = document.getElementById('item_id');
        const selectedInfo = document.getElementById('selectedInfo');
        
        searchInput.addEventListener('input', function() {
            const searchText = this.value.trim();
            if (searchText.length === 0) {
                autocompleteList.style.display = 'none';
                return;
            }
            
            const filtered = items.filter(item => 
                item.name.includes(searchText) || 
                item.name.startsWith(searchText)
            );
            
            if (filtered.length > 0) {
                autocompleteList.style.display = 'block';
                autocompleteList.innerHTML = filtered.map(item => `
                    <div class="autocomplete-item" onclick="selectItem(${item.id}, '${item.name}', ${item.current_price}, ${item.quantity})">
                        <strong>${item.name}</strong> - ${item.current_price} ريال - المتوفر: ${item.quantity}
                    </div>
                `).join('');
            } else {
                autocompleteList.style.display = 'none';
            }
        });
        
        function selectItem(id, name, price, quantity) {
            searchInput.value = name;
            itemIdInput.value = id;
            autocompleteList.style.display = 'none';
            selectedInfo.style.display = 'block';
            selectedInfo.innerHTML = `
                <strong>✅ المنتج المختار:</strong> ${name}<br>
                <strong>💰 السعر الحالي:</strong> ${price} ريال<br>
                <strong>📦 الكمية المتوفرة:</strong> ${quantity}
            `;
        }
        
        // إخفاء القائمة عند النقر خارجها
        document.addEventListener('click', function(e) {
            if (e.target !== searchInput) {
                autocompleteList.style.display = 'none';
            }
        });
    </script>
</body>
</html>
