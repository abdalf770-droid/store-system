<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل النشاطات - محل ابن الشيخ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', Arial; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; padding: 20px; }
        h2 { color: #667eea; text-align: center; }
        .back-btn { display: inline-block; margin-bottom: 20px; padding: 8px 15px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        @media (max-width: 768px) { th, td { font-size: 11px; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="back-btn">🏠 العودة للرئيسية</a>
        <h2>📋 سجل نشاطات المستخدمين</h2>
        <table>
            <thead>
                <tr><th>التاريخ</th><th>المستخدم</th><th>الإجراء</th><th>التفاصيل</th><th>IP</th></tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.log_date[:16] }}</td>
                    <td>{{ log.username }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.details or '-' }}</td>
                    <td>{{ log.ip_address or '-' }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
