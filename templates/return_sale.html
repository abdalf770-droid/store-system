<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرتجع - محل ابن الشيخ شتيه</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #17a2b8; margin-bottom: 20px; text-align: center; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .info {
            background: #fff3cd;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/sales_list" class="back-btn">📋 العودة لسجل المبيعات</a>
        <h2>🔄 مرتجع مبيعات</h2>
        
        <div class="info">
            <strong>المنتج:</strong> {{ sale.item_name }}<br>
            <strong>الكمية المشتراة:</strong> {{ sale.quantity_sold }} قطعة<br>
            <strong>سعر البيع:</strong> {{ "%.2f"|format(sale.selling_price) }} ريال
        </div>
        
        <form method="post">
            <div class="form-group">
                <label>كمية المرتجع:</label>
                <input type="number" name="return_quantity" max="{{ sale.quantity_sold }}" min="1" required>
            </div>
            <div class="form-group">
                <label>سبب المرتجع:</label>
                <select name="reason" required>
                    <option value="خلل في المنتج">🔧 خلل في المنتج</option>
                    <option value="العميل غير راغب">😞 العميل غير راغب</option>
                    <option value="منتج خطأ">❌ منتج خطأ</option>
                    <option value="سبب آخر">📝 سبب آخر</option>
                </select>
            </div>
            <button type="submit">✅ تأكيد المرتجع</button>
        </form>
        
        <div class="info">
            💡 المبلغ المسترد: سيتم حسابه تلقائياً (الكمية المرتجعة × سعر البيع)
        </div>
    </div>
</body>
</html>
