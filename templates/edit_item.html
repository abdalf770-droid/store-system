<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل صنف - محل ابن الشيخ </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #ffc107;
            margin-bottom: 20px;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ffc107;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        button:hover {
            background: #e0a800;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            margin-top: 10px;
        }
        .delete-btn:hover {
            background: #c82333;
        }
        .info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/inventory" class="back-btn">🏠 العودة للمخازن</a>
        <h2>✏️ تعديل صنف: {{ item.name }}</h2>
        <form method="post">
            <div class="form-group">
                <label>اسم الصنف:</label>
                <input type="text" name="name" value="{{ item.name }}" required>
            </div>
            <div class="form-group">
                <label>سعر الشراء:</label>
                <input type="number" name="purchase_price" step="0.01" value="{{ item.purchase_price }}" required>
            </div>
            <div class="form-group">
                <label>أقل سعر بيع:</label>
                <input type="number" name="min_price" step="0.01" value="{{ item.min_selling_price }}" required>
            </div>
            <div class="form-group">
                <label>أعلى سعر بيع:</label>
                <input type="number" name="max_price" step="0.01" value="{{ item.max_selling_price }}" required>
            </div>
            <div class="form-group">
                <label>متوسط سعر البيع:</label>
                <input type="number" name="avg_price" step="0.01" value="{{ item.avg_selling_price }}" required>
            </div>
            <div class="form-group">
                <label>سعر البيع الحالي:</label>
                <input type="number" name="current_price" step="0.01" value="{{ item.current_price }}" required>
            </div>
            <div class="form-group">
                <label>الكمية المتوفرة:</label>
                <input type="number" name="quantity" value="{{ item.quantity }}" required>
            </div>
            <button type="submit">💾 حفظ التعديلات</button>
        </form>
        <form action="/delete_item/{{ item.id }}" method="GET" onsubmit="return confirm('هل أنت متأكد من حذف هذا الصنف نهائياً؟')">
            <button type="submit" class="delete-btn">🗑️ حذف الصنف نهائياً</button>
        </form>
        <div class="info">
            💡 يمكنك تعديل جميع البيانات: الاسم، الأسعار، والكمية<br>
            💡 إذا أردت زيادة الكمية فقط، اكتب العدد الجديد (الكمية القديمة + الجديدة)
        </div>
    </div>
</body>
</html>
